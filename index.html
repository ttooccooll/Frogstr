<script>
"use strict";
const CELL=50, ROWS=13, W=700, GH=ROWS*CELL, HUD_H=190;
const cv=document.getElementById('c'), ctx=cv.getContext('2d');

function rr(x,y,w,h,r){
  r=Math.min(r,h/2,w/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

// ---------------- NOSTR RELAY CONNECTIONS ----------------
const RELAYS=[
  'wss://relay.damus.io',
  'wss://nos.lol',
  'wss://relay.primal.net',
  'wss://relay.nostr.band',
  'wss://relay.snort.social',
  'wss://relay.current.fyi',
  'wss://nostr.wine',
  'wss://eden.nostr.land',
  'wss://relay.nostr.bg',
  'wss://nostr.fmt.wiz.biz',
  'wss://relay.orangepill.dev',
  'wss://nostr-pub.wellorder.net',
  'wss://offchain.pub',
  'wss://purplepag.es'
];
const PUBLISH_RELAYS=[
  'wss://relay.damus.io',
  'wss://nos.lol',
  'wss://relay.primal.net',
  'wss://relay.nostr.band',
  'wss://relay.snort.social',
  'wss://offchain.pub'
];
const vehiclePool=[], logPool=[], seen=new Set();
let vi=0, li=0;

// GM/GN notes = logs (safe to ride)
const reGM=/(^|\s)(gm|gn)(\s|[!.,~]|$)|good\s*morning|good\s*night/i;
// Bitcoin AND Nostr notes = vehicles (dangerous cars)
const reVehicle=/\b(bitcoin|btc|sats?|nostr|zap(s|ped|ping)?|lightning|hodl|stack(ing)?\s*sats|relay|npub|nip[\s-]?\d|client|primal|damus|amethyst|snort|coracle)\b/i;

function clean(s){
  return s
    .replace(/nostr:[a-z0-9]+/gi,' ')
    .replace(/\b(npub|nsec|note|nevent|nprofile|naddr|lnbc|lnurl)1[a-z0-9]+/gi,' ')
    .replace(/https?:\/\/\S+/gi,' ')
    .replace(/\bwss?:\/\/\S+/gi,' ')
    .replace(/\b[0-9a-f]{16,}\b/gi,' ')
    .replace(/\b[A-Za-z0-9+/=_-]{25,}\b/g,' ')
    .replace(/#\[\d+\]/g,' ')
    .replace(/\s+/g,' ').trim();
}
function addNote(ev){
  if(seen.has(ev.id))return; seen.add(ev.id);
  const txt=clean(ev.content);
  if(txt.length<4||txt.length>280)return;
  if(!/[a-zA-Z]{2}/.test(txt))return;
  const note={text:txt, pubkey:ev.pubkey, id:ev.id, ts:ev.created_at};
  // GM/GN takes priority (logs), but exclude bitcoin/nostr notes
  if(reGM.test(txt) && !reVehicle.test(txt)) logPool.push(note);
  // Bitcoin + Nostr keywords = cars
  else if(reVehicle.test(txt)) vehiclePool.push(note);
}

let connectedRelays=0;
RELAYS.forEach(url=>{
  try{
    const ws=new WebSocket(url);
    ws.onopen=()=>{
      connectedRelays++;
      ws.send(JSON.stringify(["REQ","main",{kinds:[1],limit:400}]));
      // Bitcoin + nostr hashtag targets
      ws.send(JSON.stringify(["REQ","btc",{kinds:[1],"#t":["bitcoin","btc","nostr","lightning","zap","plebchain"],limit:200}]));
      // Nostr-specific hashtags
      ws.send(JSON.stringify(["REQ","nstr",{kinds:[1],"#t":["nostr","damus","primal","amethyst","relay","nip"],limit:200}]));
      // GM/GN hashtags
      ws.send(JSON.stringify(["REQ","gm",{kinds:[1],"#t":["gm","gn","goodmorning","goodnight"],limit:200}]));
      // nostr.band search support
      if(url.includes('nostr.band')){
        ws.send(JSON.stringify(["REQ","sb",{kinds:[1],search:"bitcoin",limit:200}]));
        ws.send(JSON.stringify(["REQ","sn",{kinds:[1],search:"nostr",limit:200}]));
        ws.send(JSON.stringify(["REQ","sg",{kinds:[1],search:"gm",limit:200}]));
        ws.send(JSON.stringify(["REQ","sz",{kinds:[1],search:"zap lightning",limit:150}]));
      }
    };
    ws.onmessage=m=>{
      try{const d=JSON.parse(m.data);
        if(d[0]==="EVENT"&&d[2]&&d[2].kind===1) addNote(d[2]);
      }catch(e){}
    };
    ws.onerror=()=>{};
  }catch(e){}
});
const FALLBACK_V=[{text:"waiting for nostr notes...",pubkey:"",ts:0}];
const FALLBACK_L=[{text:"waiting for GM notes...",pubkey:"",ts:0}];
const getVehicleNote=()=>vehiclePool.length?vehiclePool[vi++%vehiclePool.length]:FALLBACK_V[0];
const getLogNote=()=>logPool.length?logPool[li++%logPool.length]:FALLBACK_L[0];

// ---------------- NOSTR AUTH (NIP-07) ----------------
let loggedInPubkey=null;
let loggedInNpub=null;
let nostrLoginTried=false;
let publishSockets=[];

// Simple bech32 encoder for npub
function toBech32(prefix,hex){
  const CHARSET='qpzry9x8gf2tvdw0s3jn54khce6mua7l';
  function polymod(values){let c=1;for(const v of values){const c0=c>>>25;c=((c&0x1ffffff)<<5)^v;for(let i=0;i<5;i++)if((c0>>>i)&1)c^=[0x3b6a57b2,0x26508e6d,0x1ea119fa,0x3d4233dd,0x2a1462b3][i];}return c;}
  function hrpExpand(hrp){const r=[];for(const c of hrp)r.push(c.charCodeAt(0)>>5);r.push(0);for(const c of hrp)r.push(c.charCodeAt(0)&31);return r;}
  function createChecksum(hrp,data){const values=[...hrpExpand(hrp),...data,0,0,0,0,0,0];const pm=polymod(values)^1;const ret=[];for(let i=0;i<6;i++)ret.push((pm>>>(5*(5-i)))&31);return ret;}
  function convertBits(data,fromBits,toBits,pad){let acc=0,bits=0;const ret=[];const maxv=(1<<toBits)-1;for(const v of data){acc=(acc<<fromBits)|v;bits+=fromBits;while(bits>=toBits){bits-=toBits;ret.push((acc>>>bits)&maxv);}}if(pad){if(bits>0)ret.push((acc<<(toBits-bits))&maxv);}return ret;}
  const bytes=[];for(let i=0;i<hex.length;i+=2)bytes.push(parseInt(hex.substr(i,2),16));
  const words=convertBits(bytes,8,5,true);
  const checksum=createChecksum(prefix,words);
  return prefix+'1'+[...words,...checksum].map(d=>CHARSET[d]).join('');
}

// Publish note to relays
function openPublishRelays(){
  if(publishSockets.length)return publishSockets;
  PUBLISH_RELAYS.forEach(url=>{
    try{
      const ws=new WebSocket(url);
      ws.onopen=()=>{ws.ready=true;};
      ws.onerror=()=>{};
      publishSockets.push(ws);
    }catch(e){}
  });
  return publishSockets;
}

async function shareScoreNote(finalScore){
  console.log('shareScoreNote called, loggedInPubkey:', loggedInPubkey, 'window.nostr:', !!window.nostr);
  if(!loggedInPubkey||!window.nostr)return false;
  const event={
    kind:1,
    created_at:Math.floor(Date.now()/1000),
    tags:[["t","frogstr"],["t","nostr"],["t","gaming"]],
    content:`🐸 I scored ${finalScore} on FROGSTR! 🐸\n\nDodge nostr & bitcoin notes, ride GM/GN logs across the river.\n\n#frogstr #nostr #gaming\n\nhttps://frogstr.nostrminusnostr.xyz`,
    pubkey:loggedInPubkey
  };
  console.log('Signing event:', event);
  try{
    const signed=await window.nostr.signEvent(event);
    console.log('Event signed:', signed);
    const sockets=openPublishRelays();
    sockets.forEach(ws=>{
      if(ws.readyState===1) ws.send(JSON.stringify(["EVENT",signed]));
    });
    return true;
  }catch(e){ console.log('signEvent error:', e); return false; }
}

// ---------------- GAME ----------------
const lanes=[
 {row:1,log:true, v:  50},
 {row:2,log:true, v: -38},
 {row:3,log:true, v:  63},
 {row:4,log:true, v: -45},
 {row:5,log:true, v:  44},
 {row:7,log:false,v: -68, color:'#ff2d6f'},
 {row:8,log:false,v:  85, color:'#ffb000'},
 {row:9,log:false,v: -54, color:'#00cfff'},
 {row:10,log:false,v: 103,color:'#b14cff'},
 {row:11,log:false,v: -77,color:'#ff5e3a'},
];
lanes.forEach(l=>l.ents=[]);
let frog,lives,score,dead,deadTimer,hudNote,hudDeath,started,homes,gameOver;
let gameOverHandled=false;
const homeX=[1,4,6.5,9,12];
function newGame(){
  frog={x:6.5*CELL,y:12*CELL};
  lives=3; score=0; dead=0; deadTimer=0; hudNote=null; hudDeath=false;
  homes=[false,false,false,false,false]; gameOver=false; gameOverHandled=false;
}
newGame(); started=false;

function spawn(lane){
  const note=lane.log?getLogNote():getVehicleNote();
  const w=Math.max(lane.log?180:130, Math.min(lane.log?330:280, note.text.length*7));
  lane.ents.push({x:lane.v>0?-w-10:W+10, w, note, off:Math.random()*500});
}
function ready(lane){
  if(!lane.ents.length)return true;
  const last=lane.ents[lane.ents.length-1], gap=155+Math.random()*150;
  return lane.v>0 ? (last.x > -10+gap) : (last.x+last.w < W+10-gap);
}
function resetFrog(){ frog.x=6.5*CELL; frog.y=12*CELL; }
function die(note){
  lives--; dead=1; deadTimer=1.0;
  if(note){hudNote=note; hudDeath=true;}
  if(lives<=0)gameOver=true;
}
function move(dir){
  if(gameOver&&!gameOverHandled)return;
  if(gameOver&&gameOverHandled){ newGame(); started=true; return; }
  if(!started){ started=true; return; }
  if(dead)return;
  if(dir==='up')frog.y-=CELL;
  else if(dir==='down')frog.y=Math.min(12*CELL,frog.y+CELL);
  else if(dir==='left')frog.x-=CELL;
  else if(dir==='right')frog.x+=CELL;
  frog.x=Math.max(0,Math.min(W-CELL,frog.x));
  frog.y=Math.max(0,frog.y);
}
document.addEventListener('keydown',e=>{
  const map={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',w:'up',s:'down',a:'left',d:'right'};
  if(map[e.key]){ move(map[e.key]); e.preventDefault(); }
  if(gameOver&&gameOverHandled){ newGame(); started=true; e.preventDefault(); }
});
let tsx=0,tsy=0;
cv.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];tsx=t.clientX;tsy=t.clientY;},{passive:false});
cv.addEventListener('touchend',e=>{
  e.preventDefault();
  const rect=cv.getBoundingClientRect();
  const scaleX=W/rect.width;
  const scaleY=(GH+HUD_H)/rect.height;
  const cx=(e.changedTouches[0].clientX-rect.left)*scaleX;
  const cy=(e.changedTouches[0].clientY-rect.top)*scaleY;
  const t=e.changedTouches[0], dx=t.clientX-tsx, dy=t.clientY-tsy;
  
  // Handle button taps - HUD area OR game over screen
  if(cy>=GH || (gameOver && gameOverHandled)){
    handleButtonClick(cx,cy);
    return;
  }
  
  // Game movement swipes
  if(gameOver&&gameOverHandled){ newGame(); started=true; return; }
  if(Math.abs(dx)<18&&Math.abs(dy)<18){ move('up'); return; }
  if(Math.abs(dx)>Math.abs(dy)) move(dx>0?'right':'left');
  else move(dy>0?'down':'up');
},{passive:false});

function handleButtonClick(cx,cy){
  console.log('handleButtonClick called, gameOver:', gameOver, 'gameOverHandled:', gameOverHandled, 'showShareBtn:', showShareBtn, 'shareClicked:', shareClicked);
  // Donate button click
  const dbX=W/2-60, dbY=GH+150, dbW=120, dbH=28;
  if(cx>=dbX&&cx<=dbX+dbW&&cy>=dbY&&cy<=dbY+dbH){
    qrContainer.innerHTML='';
    donateStatus.textContent='SCAN WITH YOUR LIGHTNING WALLET';
    new QRCode(qrContainer,{text:`lightning:${LIGHTNING_ADDRESS}`,width:180,height:180,colorDark:'#0f0',colorLight:'#000'});
    donateModal.style.display='flex';
    return;
  }
  // stacker.news link click
  if(cx>=W-105&&cx<=W-20&&cy>=GH+150&&cy<=GH+178){
    window.open('https://stacker.news/jasonb','_blank');
    return;
  }
  
  if(!gameOver||!gameOverHandled)return;
  
// Share button
  if(showShareBtn&&!shareClicked){
    const btnX=W/2-130, btnY=GH/2+40, btnW=260, btnH=38;
    if(cx>=btnX&&cx<=btnX+btnW&&cy>=btnY&&cy<=btnY+btnH){
      console.log('Share button clicked, calling shareScoreNote...');
      shareClicked=true;
      shareScoreNote(score);
      return;
    }
  }
  // Play again button
  const paY=showShareBtn?GH/2+96:GH/2+55;
  const paX=W/2-100, paW=200, paH=34;
  if(cx>=paX&&cx<=paX+paW&&cy>=paY&&cy<=paY+paH){
    newGame(); started=true;
  }
}

// Game over handling
let showShareBtn=false, showPlayAgainBtn=false;
let shareClicked=false;

function handleGameOver(){
  if(gameOverHandled)return;
  gameOverHandled=true;
  showPlayAgainBtn=true;
  shareClicked=false;
  // Try to get pubkey when game ends (not on page load)
  if(!loggedInPubkey && window.nostr && !nostrLoginTried){
    nostrLoginTried=true;
    console.log('Attempting to get nostr pubkey...');
    window.nostr.getPublicKey().then(pubkey=>{
      console.log('Got pubkey:', pubkey);
      loggedInPubkey=pubkey;
      showShareBtn=true;
      console.log('showShareBtn set to:', showShareBtn);
    }).catch(e=>{ console.log('getPublicKey error:', e); });
  }
  showShareBtn=!!loggedInPubkey&&score>0;
}

// Canvas click detection for game over buttons and donate
cv.addEventListener('click',e=>{
  const rect=cv.getBoundingClientRect();
  const scaleX=W/rect.width;
  const scaleY=(GH+HUD_H)/rect.height;
  const cx=(e.clientX-rect.left)*scaleX;
  const cy=(e.clientY-rect.top)*scaleY;
  handleButtonClick(cx,cy);
});

let lastT=performance.now();
function loop(t){
  const dt=Math.min(0.05,(t-lastT)/1000); lastT=t;
  update(dt); draw(t);
  requestAnimationFrame(loop);
}
function update(dt){
  lanes.forEach(lane=>{
    if(ready(lane))spawn(lane);
    lane.ents.forEach(en=>en.x+=lane.v*dt);
    lane.ents=lane.ents.filter(en=>en.x>-en.w-60&&en.x<W+60);
  });
  if(dead){ deadTimer-=dt; if(deadTimer<=0){dead=0; if(!gameOver)resetFrog(); else handleGameOver();} return; }
  if(gameOver||!started)return;

  const row=Math.round(frog.y/CELL);
  const fx=frog.x+CELL*0.22, fw=CELL*0.56;
  if(row>=7&&row<=11){
    const lane=lanes.find(l=>l.row===row);
    for(const en of lane.ents){
      if(fx<en.x+en.w-4 && fx+fw>en.x+4){ die(en.note); return; }
    }
  } else if(row>=1&&row<=5){
    const lane=lanes.find(l=>l.row===row);
    let on=null;
    const cx2=frog.x+CELL/2;
    for(const en of lane.ents){
      if(cx2>en.x-6 && cx2<en.x+en.w+6){ on=en; break; }
    }
    if(on){
      frog.x+=lane.v*dt; hudNote=on.note; hudDeath=false;
      if(frog.x<-CELL*0.6||frog.x>W-CELL*0.4){ die(on.note); return; }
    } else { die(null); return; }
  } else if(row===0){
    let slot=-1;
    for(let i=0;i<5;i++){ if(!homes[i]&&Math.abs(frog.x/CELL-homeX[i])<0.75)slot=i; }
    if(slot>=0){
      homes[slot]=true; score+=100;
      if(homes.every(h=>h)){ score+=500; homes=[false,false,false,false,false]; }
      resetFrog();
    } else die(null);
  }
}

const shortKey=pk=>pk?toBech32('npub',pk).slice(0,12)+'..':'--';
const fmtTime=ts=>ts?new Date(ts*1000).toLocaleString():"";

// Pixel-style text helper
function pixelText(text,x,y,size,color,align){
  const c=color||'#0f0';
  ctx.fillStyle=c;
  ctx.shadowColor=c;
  ctx.shadowBlur=size<12?4:6;
  ctx.font=`bold ${size||16}px "Press Start 2P","Courier New",monospace`;
  ctx.textAlign=align||'left';
  ctx.textBaseline='middle';
  ctx.fillText(text,x,y);
  ctx.shadowBlur=0;
}

function draw(t){
  ctx.fillStyle='#0a0a0a'; ctx.fillRect(0,0,W,GH+HUD_H);
  
  // Water zone
  ctx.fillStyle='#001030'; ctx.fillRect(0,CELL,W,5*CELL);
  // Water grid lines (retro feel)
  ctx.strokeStyle='rgba(0,100,200,0.12)'; ctx.lineWidth=1;
  for(let r=1;r<=5;r++){
    ctx.beginPath(); ctx.moveTo(0,r*CELL); ctx.lineTo(W,r*CELL); ctx.stroke();
  }
  // Animated water ripples
  ctx.shadowColor='#0af'; ctx.shadowBlur=2;
  ctx.strokeStyle='rgba(0,200,255,0.04)'; ctx.lineWidth=1;
  for(let r=0;r<8;r++){
    const ry=CELL+15+r*30+(Math.sin(t/500+r)*3);
    ctx.beginPath();
    for(let x=0;x<W;x+=8){
      const yoff=Math.sin((x+t/200)+r*0.5)*4;
      ctx.lineTo(x,ry+yoff);
    }
    ctx.stroke();
  }
  ctx.shadowBlur=0;
  // Animated water dots
  ctx.fillStyle='rgba(80,140,255,0.2)';
  for(let i=0;i<20;i++){
    const sy=CELL+12+((i*41)%(5*CELL-24));
    const sx=((t/25)+i*89)%(W+40)-20;
    ctx.fillRect(Math.floor(sx),Math.floor(sy),3,2);
  }
  
  // Road zone
  ctx.fillStyle='#111'; ctx.fillRect(0,7*CELL,W,5*CELL);
  // Road lane dashes
  ctx.shadowColor='#caca20'; ctx.shadowBlur=4;
  ctx.fillStyle='#caca20';
  for(let r=8;r<=11;r++){
    for(let dx=0;dx<W;dx+=36){
      ctx.fillRect(dx,r*CELL-1,16,2);
    }
  }
  ctx.shadowBlur=0;
  
  // Home strip
  ctx.fillStyle='#1a0a40'; ctx.fillRect(0,0,W,CELL);
  // Pixel border on home
  ctx.strokeStyle='#6030c0'; ctx.lineWidth=2;
  ctx.strokeRect(0,0,W,CELL);
  
  // Grass bands (pixel style)
  drawGrass(6*CELL); drawGrass(12*CELL);
  
  // Home pads
  for(let i=0;i<5;i++){
    const cx2=homeX[i]*CELL+5, cy2=CELL/2;
    ctx.fillStyle=homes[i]?'#2fbf4f':'#1a5a2a';
    ctx.shadowColor='#0f0'; ctx.shadowBlur=5;
    ctx.fillRect(cx2-16,cy2-14,32,28);
    ctx.strokeStyle=homes[i]?'#7fe89a':'#2a7a3a'; ctx.lineWidth=2;
    ctx.strokeRect(cx2-16,cy2-14,32,28);
    ctx.shadowBlur=0;
    if(homes[i]) drawFrog(cx2-12,cy2-12,0.5);
  }
  
  // --- entities ---
  ctx.font='14px "Courier New",monospace'; ctx.textBaseline='middle';
  lanes.forEach(lane=>{
    const y=lane.row*CELL+6, h=CELL-12;
